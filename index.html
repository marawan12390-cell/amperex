.rail .r-item:hover .r-tip{opacity:1}
.rail .r-divider{width:20px;height:1px;background:var(--surface-3);margin:6px 0}
/* ===== NAVIGATOR PANE ===== */
.nav-pane{
  grid-area:nav;background:var(--bg-deep);
  border-right:1px solid var(--glass-border);
  display:flex;flex-direction:column;overflow:hidden;
}
.nav-head{
  padding:12px 14px 10px;border-bottom:1px solid var(--glass-border);
  display:flex;flex-direction:column;gap:8px;
}
.nav-head .nh-row{display:flex;align-items:center;justify-content:space-between}
.nav-head h3{
  margin:0;font-size:10px;font-weight:600;
  letter-spacing:0.14em;text-transform:uppercase;color:var(--txt-dim);
}
.nav-head .nh-btn{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
  border:none;background:transparent;color:var(--txt-dim);cursor:pointer;border-radius:4px;
}
.nav-head .nh-btn:hover{color:var(--text);background:var(--surface-2)}
.nav-search{
  display:flex;align-items:center;gap:8px;
  background:var(--bg-darkest);border:1px solid var(--glass-border);
  border-radius:4px;padding:5px 8px;
}
.nav-search input{
  flex:1;border:none!important;background:transparent!important;color:var(--text);
  font-family:inherit;font-size:12px;outline:none;padding:0!important;
  box-shadow:none!important;
}
.nav-search input::placeholder{color:var(--ink-4)}
.nav-search svg{flex-shrink:0}
.nav-search kbd{
  font-family:'Courier New',monospace;font-size:10px;
  background:var(--bg-mid);color:var(--txt-dim);padding:1px 5px;border-radius:2px;
  border:1px solid var(--glass-border);line-height:1.3;
}
.nav-filters{
  display:flex;gap:4px;padding:6px 12px;border-bottom:1px solid var(--glass-border);
  flex-wrap:wrap;
}
.nav-pill{
  font-size:10px;padding:3px 8px;border-radius:3px;
  background:color-mix(in srgb, var(--navy) 10%, transparent);color:var(--txt-dim);
  border:1px solid var(--glass-border);cursor:pointer;
  font-family:inherit;transition:all 150ms;
}
.nav-pill:hover{color:var(--text);border-color:var(--glass-border-h)}
.nav-pill.active{background:color-mix(in srgb, var(--navy) 12%, transparent);color:var(--accent);border-color:color-mix(in srgb, var(--navy) 28%, transparent)}
.nav-tree{
  flex:1;overflow-y:auto;padding:4px 0;
}
.nav-tree::-webkit-scrollbar{width:5px}
.nav-tree::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
/* Floor row */
.nt-floor{
  display:flex;align-items:center;gap:6px;
  padding:6px 10px;cursor:pointer;
  font-size:12px;color:var(--text);font-weight:500;
  letter-spacing:0.02em;user-select:none;
}
.nt-floor:hover{background:color-mix(in srgb, var(--ink) 4%, transparent)}
.nt-floor .nt-caret{width:12px;font-size:10px;color:var(--txt-dim);transition:transform 120ms;text-align:center}
.nt-floor.collapsed .nt-caret{transform:rotate(-90deg)}
.nt-floor .nt-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nt-floor .nt-meta{font-family:monospace;font-size:10px;color:var(--txt-dim);white-space:nowrap}
/* Apartment row */
.nt-apt{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px 5px 26px;cursor:pointer;
  font-size:11.5px;color:var(--ink-2);user-select:none;
}
.nt-apt:hover{background:color-mix(in srgb, var(--ink) 4%, transparent)}
.nt-apt.active{background:color-mix(in srgb, var(--navy) 10%, transparent);color:var(--text)}
.nt-apt .nt-dot{width:6px;height:6px;border-radius:50%;background:color-mix(in srgb, var(--navy) 35%, transparent);flex-shrink:0}
.nt-apt.active .nt-dot{background:var(--accent)}
.nt-apt .nt-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nt-apt .nt-meta{font-family:monospace;font-size:10px;color:var(--txt-dim);margin-left:auto;white-space:nowrap}
/* Room row */
.nt-room{
  display:flex;align-items:center;gap:6px;
  padding:4px 10px 4px 44px;cursor:pointer;
  font-size:11px;color:var(--ink-3);user-select:none;
}
.nt-room:hover{background:color-mix(in srgb, var(--ink) 4%, transparent);color:var(--ink-2)}
.nt-room.selected{
  color:var(--text);background:color-mix(in srgb, var(--navy) 10%, transparent);
  border-left:2px solid var(--accent);padding-left:42px;
}
.nt-room .nt-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nt-room .nt-meta{font-family:monospace;font-size:10px;color:var(--txt-dim);white-space:nowrap}
.nt-room .nt-warn{
  width:6px;height:6px;border-radius:50%;background:var(--warn);
  box-shadow:0 0 5px color-mix(in srgb, var(--g-warn) 40%, transparent);flex-shrink:0;
}
/* Panel/SMDB rows (step 3+) */
.nt-panel{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px 5px 26px;cursor:pointer;
  font-size:11.5px;color:var(--ink-2);user-select:none;
}
.nt-panel:hover{background:color-mix(in srgb, var(--ink) 4%, transparent)}
.nt-panel.active{background:color-mix(in srgb, var(--navy) 10%, transparent);color:var(--text)}
.nt-panel .nt-icon{width:14px;height:14px;color:var(--txt-dim);flex-shrink:0}
.nt-panel.active .nt-icon{color:var(--accent)}
.nt-panel .nt-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nt-panel .nt-meta{font-family:monospace;font-size:10px;color:var(--txt-dim);white-space:nowrap}
/* Step indicator pills */
.nt-steps{
  display:flex;gap:2px;padding:8px 12px;border-bottom:1px solid var(--glass-border);
}
.nt-step{
  flex:1;text-align:center;padding:4px 0;border-radius:3px;
  font-size:9px;font-weight:600;letter-spacing:0.06em;
  color:var(--txt-dim);cursor:pointer;font-family:inherit;
  border:none;background:transparent;transition:all 150ms;
}
.nt-step:hover{background:var(--surface-2)}
.nt-step.active{background:color-mix(in srgb, var(--navy) 10%, transparent);color:var(--accent)}
.nt-step.done{color:rgba(52,211,153,0.6)}
/* Nav empty state */
.nav-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:20px;text-align:center;color:var(--ink-4);font-size:12px;
}
/* Quick tools list in nav */
.nt-tool{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;cursor:pointer;
  font-size:12px;color:var(--ink-3);
  border:none;background:transparent;width:100%;text-align:left;
  font-family:inherit;transition:all 150ms;
}
.nt-tool:hover{background:var(--surface-2);color:var(--ink-2)}
.nt-tool.active{color:var(--text);background:color-mix(in srgb, var(--navy) 10%, transparent)}
.nt-tool svg{width:16px;height:16px;flex-shrink:0;color:var(--txt-dim)}
.nt-tool.active svg{color:var(--accent)}
/* Main workspace */
.workspace{
  grid-area:main;overflow-y:auto;overflow-x:hidden;
  display:flex;flex-direction:column;
  background:transparent;
}
.workspace::-webkit-scrollbar{width:6px}
.workspace::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:3px}
/* ===== INSPECTOR PANE (Session 4) ===== */
.inspector-pane{
  grid-area:inspector;background:var(--bg-deep);
  border-left:1px solid var(--glass-border);
  display:flex;flex-direction:column;overflow:hidden;
}
.insp-tabs{
  display:flex;border-bottom:1px solid var(--glass-border);
  background:rgba(7,18,31,0.5);
}
.insp-tab{
  flex:1;text-align:center;padding:10px 0;
  font-size:10px;color:var(--txt-dim);letter-spacing:0.08em;text-transform:uppercase;
  border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;
  background:transparent;border-top:none;border-left:none;border-right:none;
  font-weight:600;transition:all 150ms;
}
.insp-tab:hover{color:var(--ink-2)}
.insp-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.insp-body{flex:1;overflow-y:auto;padding:0}
.insp-body::-webkit-scrollbar{width:5px}
.insp-body::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:3px}
.insp-section{
  padding:14px 16px;border-bottom:1px solid var(--line);
  animation:fadeIn 180ms ease;
}
.insp-section:last-child{border-bottom:none}
.insp-section h5{
  margin:0 0 10px;font-size:10px;font-weight:600;
  letter-spacing:0.12em;text-transform:uppercase;color:var(--txt-dim);
  display:flex;align-items:center;gap:8px;
}
.insp-section h5::after{
  content:"";flex:1;height:1px;background:var(--glass-border);
}
.insp-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;font-size:11.5px;gap:8px;
}
.insp-row .k{color:var(--txt-dim);flex-shrink:0}
.insp-row .v{
  font-family:monospace;color:var(--text);text-align:right;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  font-variant-numeric:tabular-nums;
}
.insp-row .v.ok{color:var(--g-ok)}
.insp-row .v.warn{color:var(--g-warn)}
.insp-row .v.ng{color:var(--g-err)}
.insp-row .v.accent{color:var(--accent)}
.insp-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;text-align:center;color:var(--ink-4);
  font-size:12px;line-height:1.6;
}
.insp-empty .ie-icon{font-size:24px;opacity:0.4;margin-bottom:10px}
.insp-empty .ie-title{font-size:13px;color:var(--ink-3);margin-bottom:6px;font-weight:500}
.insp-empty .ie-body{font-size:11px;max-width:200px;color:var(--ink-4)}
.insp-check{
  display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:11px;
  border-bottom:1px solid var(--line);
}
.insp-check:last-child{border-bottom:none}
.insp-check .icon{flex-shrink:0;font-weight:700;width:14px;text-align:center}
.insp-check.ok .icon{color:var(--g-ok)}
.insp-check.warn .icon{color:var(--g-warn)}
.insp-check.ng .icon{color:var(--g-err)}
.insp-check .body{flex:1;color:var(--ink-2);line-height:1.5}
.insp-check .body .nm{color:var(--text);font-weight:500}
.insp-check .body .cmp{font-family:monospace;font-size:10px;color:var(--txt-dim);margin-top:2px}
.insp-check .body .cite{font-size:10px;color:var(--txt-dim);font-style:italic;margin-top:2px}
.insp-help-item{
  padding:10px 0;border-bottom:1px solid var(--line);
  font-size:11.5px;line-height:1.6;color:var(--ink-2);
}
.insp-help-item:last-child{border-bottom:none}
.insp-help-item .ih-title{
  color:var(--text);font-weight:600;margin-bottom:4px;font-size:12px;
}
.insp-help-item code{
  background:var(--surface-3);padding:1px 5px;border-radius:3px;
  font-size:10px;color:var(--accent);
}
/* Status bar */
.status-bar{
  grid-area:status;background:var(--bg-darkest);
  border-top:1px solid var(--glass-border);
  display:flex;align-items:center;gap:14px;padding:0 14px;
  font-size:10px;color:var(--txt-dim);z-index:3;
}
.status-bar .sb-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.status-bar .sb-dot.ok{background:var(--g-ok);box-shadow:0 0 5px color-mix(in srgb, var(--g-ok) 50%, transparent)}
.status-bar .sb-sep{width:1px;height:14px;background:var(--surface-3)}
.status-bar .sb-grow{flex:1}
/* Responsive: hide nav+inspector below 1280px (rail removed in R3) */
@media(max-width:1279px){
  .app-shell{grid-template-columns:1fr;grid-template-areas:
    "topbar"
    "main"
    "status";}
  .nav-pane,.inspector-pane{display:none}
}
@media(max-width:767px){
  .app-shell{grid-template-columns:1fr;grid-template-areas:
    "topbar"
    "main"
    "status";}
}
/* ===== WORKSPACE POLISH (Session 3) ===== */
.tool-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;overflow:hidden;animation:fadeIn 180ms ease;color:var(--ink);box-shadow:var(--g-shadow-md);}
/* Phase 7.3.1 — Step 2 lighting layout */
.lighting-step-body{display:grid;grid-template-columns:240px 1fr;gap:0;min-height:60vh;}
.room-list{background:var(--bg-deep);border-right:1px solid var(--glass-border);overflow-y:auto;padding:6px 0;max-height:70vh;}
.room-list-header{padding:8px 14px;font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:0.8px;border-bottom:1px solid var(--glass-border);font-weight:600;}
.room-list-item{width:100%;text-align:left;padding:9px 14px;background:transparent;border:none;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;font-size:11.5px;border-left:3px solid transparent;transition:background 120ms;font-family:inherit;}
.room-list-item:hover{background:color-mix(in srgb, var(--navy) 10%, transparent);}
.room-list-item.active{background:color-mix(in srgb, var(--navy) 10%, transparent);border-left-color:var(--accent);color:var(--accent);font-weight:500;}
.room-list-item .rli-check{width:14px;text-align:center;font-weight:600;font-size:13px;flex-shrink:0;}
.room-list-item.has-layout .rli-check{color:var(--g-ok);}
.room-list-item:not(.has-layout) .rli-check{color:var(--txt-dim);}
.room-list-item .rli-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.room-designer-pane{padding:18px 22px;overflow-y:auto;max-height:70vh;}
.room-lighting-designer .rld-section{padding:12px 0;border-bottom:1px solid var(--line);}
.room-lighting-designer .rld-section:last-child{border-bottom:none;}
.room-lighting-designer .rld-section h4{font-size:13px;margin:0 0 10px;color:var(--accent);font-weight:600;}
.room-lighting-designer details.rld-section{cursor:default;}
.room-lighting-designer details summary{cursor:pointer;font-size:10px;color:var(--txt-dim);padding:4px 0;text-transform:uppercase;letter-spacing:0.6px;font-weight:600;list-style:none;}
.room-lighting-designer details summary::-webkit-details-marker{display:none;}
.room-lighting-designer details summary::before{content:"▸ ";color:var(--accent);}
.room-lighting-designer details[open] summary::before{content:"▾ ";}
.room-lighting-designer .rld-svg{margin:16px 0;padding:12px;background:var(--bg-deep);border-radius:6px;overflow-x:auto;text-align:center;}
.room-lighting-designer .rld-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;padding:0 0 8px;}
.rld-actions .btn-primary{background:color-mix(in srgb, var(--navy) 14%, transparent);color:var(--accent);border:1px solid color-mix(in srgb, var(--navy) 30%, transparent);padding:8px 16px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.rld-actions .btn-primary:hover{background:color-mix(in srgb, var(--navy) 22%, transparent);}
.rld-actions .btn-danger{background:transparent;color:var(--g-err);border:1px solid rgba(248,113,113,0.4);padding:8px 16px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
.rld-actions button:not(.btn-primary):not(.btn-danger){background:color-mix(in srgb, var(--navy) 10%, transparent);color:var(--accent);border:1px solid color-mix(in srgb, var(--navy) 28%, transparent);padding:8px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;}
.tool-header{padding:20px 26px 16px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:12px;background:linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 140%);}
.tool-title{font-size:17px;font-weight:600;color:var(--txt);margin:0;letter-spacing:-0.01em;}
.tool-subtitle{font-size:12px;color:var(--txt-dim);}
.tool-code-badge{margin-left:auto;font-size:10px;padding:3px 8px;background:color-mix(in srgb, var(--navy) 10%, transparent);border:1px solid color-mix(in srgb, var(--navy) 28%, transparent);border-radius:4px;color:var(--accent);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;}
.tool-section{padding:16px 26px;border-bottom:1px solid var(--line);transition:opacity 150ms;}
.tool-section.muted{opacity:0.6;}
.tool-section:last-child{border-bottom:none;}
.ts-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;user-select:none;}
.ts-header h3{font-size:11px;font-weight:600;color:var(--txt-dim);text-transform:uppercase;letter-spacing:0.8px;margin:0;}
.ts-chev{margin-left:auto;color:var(--txt-dim);font-size:14px;line-height:1;font-weight:300;}
.ts-body{animation:fadeIn 180ms ease;}
.tool-hero{padding:24px 26px;background:var(--surface-2);border-radius:12px;border:1px solid var(--line);margin:16px 26px 12px;}
.tool-hero .hero-label{font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px;font-weight:600;}
.tool-hero .hero-value{font-size:32px;font-weight:600;color:var(--ink);line-height:1.1;letter-spacing:-0.02em;font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-feature-settings:'tnum' 1;}
.tool-hero .hv-unit{font-size:16px;color:var(--txt-dim);margin-left:6px;font-weight:400;}
.tool-hero .hero-sub{font-size:12px;color:var(--txt-dim);margin-top:8px;}
.tool-hero.status-ok .hero-value{color:var(--g-ok);}
.tool-hero.status-warn .hero-value{color:var(--g-warn);}
.tool-hero.status-ng .hero-value{color:var(--g-err);}
.tool-metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;background:var(--line);margin:0 26px 12px;border-radius:10px;overflow:hidden;border:1px solid var(--line);}
.tm-cell{padding:12px 14px;background:var(--bg-deep);}
.tm-cell .tm-label{font-size:10px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;font-weight:600;}
.tm-cell .tm-value{font-size:16px;font-weight:600;color:var(--txt);letter-spacing:-0.01em;}
.tm-cell .tm-unit{font-size:11px;color:var(--txt-dim);margin-left:4px;font-weight:400;}
.tm-cell .tm-sub{font-size:10px;color:var(--txt-dim);margin-top:3px;}
.tm-cell.s-ok .tm-value{color:var(--g-ok);}
.tm-cell.s-warn .tm-value{color:var(--g-warn);}
.tm-cell.s-ng .tm-value{color:var(--g-err);}
.tool-breakdown{padding:12px 24px 20px;}
.tb-toggle{background:none;border:none;color:var(--txt-dim);font-size:11px;cursor:pointer;padding:6px 0;text-transform:uppercase;letter-spacing:0.5px;font-weight:600;font-family:inherit;}
.tb-toggle:hover{color:var(--accent);}
.tb-body{margin-top:10px;padding:14px;background:rgba(0,0,0,0.2);border-radius:6px;font-size:12px;line-height:1.6;color:var(--ink-2);animation:fadeIn 200ms;font-family:monospace;}
.ws-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 40px;min-height:50vh;animation:fadeIn 200ms ease;}
.wse-icon{font-size:48px;opacity:0.3;margin-bottom:20px;}
.wse-title{font-size:18px;font-weight:500;color:var(--txt);margin:0 0 8px;}
.wse-body{font-size:13px;color:var(--txt-dim);max-width:360px;margin:0 0 24px;line-height:1.6;}
.wse-cta{padding:10px 20px;background:color-mix(in srgb, var(--navy) 10%, transparent);color:var(--accent);border:1px solid color-mix(in srgb, var(--navy) 28%, transparent);border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;}
.wse-cta:hover{background:color-mix(in srgb, var(--navy) 10%, transparent);}
/* R3 — calmer/quieter status strip (smaller value, tighter tiles); values unchanged. */
.status-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--glass-border);margin:0 0 12px 0;border-bottom:1px solid var(--glass-border);border-radius:10px;overflow:hidden;border:1px solid var(--glass-border);}
.ss-tile{padding:8px 16px;background:var(--bg-deep);}
.ss-tile .ss-label{font-size:9px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px;font-weight:600;}
.ss-tile .ss-value{font-size:14px;font-weight:500;color:var(--txt);line-height:1;letter-spacing:-0.01em;}
.ss-tile .ss-unit{font-size:11px;color:var(--txt-dim);margin-left:4px;font-weight:400;}
.ss-tile.s-warn .ss-value{color:var(--g-warn);}
.ss-tile.s-ng .ss-value{color:var(--g-err);}
.ss-tile.s-ok .ss-value{color:var(--g-ok);}
/* Transitions */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
/* View tab bar — horizontal scroll on overflow */
.view-tab-bar{scrollbar-width:thin;scrollbar-color:var(--line-2) transparent;-webkit-overflow-scrolling:touch;}
.view-tab-bar::-webkit-scrollbar{height:4px}
.view-tab-bar::-webkit-scrollbar-track{background:transparent}
.view-tab-bar::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:2px}
.view-tab-bar::-webkit-scrollbar-thumb:hover{background:var(--ink-4)}
.workspace>*{animation:fadeIn 180ms ease;}
/* Micro-interactions */

 default VA, phase, PF, and demand factor."},{t:"Tips",b:"Use Templates for typical bedroom/kitchen/bathroom configs. Optimize Circuits auto-balances loads."}],project_apt:[{t:"Apartment",b:"An apartment contains rooms. The apartment-level DP (distribution panel) feeds all its circuits."}],project_floor:[{t:"Floor",b:"A floor contains apartments (residential) or zones (other). Floor-level SMDB feeds all apartment DPs."}],project_overview:[{t:"Project workflow",b:"Steps: 1) Rooms → 2) Panels → 3) Conduits → 4) Distribution → 5) Summary → 6) BOQ."},{t:"Active code",b:"Switch code in the settings bar. All factors (cable, breaker, motor, VD limits) update accordingly."},{t:"Save / Load",b:"Use Copy JSON / Load buttons to share project state."}]};function renderHelp(){var key=ctx?ctx.helpKey||(ctx.type==="tool"?ctx.toolId:null):null;var items=key?HELP[key]:null;var guideSec=key&&key.indexOf("project_")===0?"workflow":key?"quickTools":"onboarding";var guideLink=React.createElement("button",{onClick:function(){if(props.onOpenGuide)props.onOpenGuide(guideSec);},style:{marginTop:12,background:"none",border:"none",color:"var(--accent)",fontSize:12,fontWeight:600,cursor:"pointer",padding:"6px 0",textAlign:"left"}},"→ Open full guide");if(!items||items.length===0)return React.createElement("div",{className:"insp-section"},renderEmpty("ⓘ","No help available","Select a tool or project item to see context-relevant tips."),guideLink);return React.createElement("div",{className:"insp-section"},items.map(function(it,i){return React.createElement("div",{className:"insp-help-item",key:i},React.createElement("div",{className:"ih-title"},it.t),React.createElement("div",null,it.b));}),guideLink);}return React.createElement("div",{style:{display:"flex",flexDirection:"column",height:"100%"}},React.createElement("div",{className:"insp-tabs"},React.createElement("button",{className:"insp-tab"+(itab==="props"?" active":""),onClick:function(){setItab("props");}},"Properties"),React.createElemen
